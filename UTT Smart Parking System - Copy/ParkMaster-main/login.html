<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập & Đăng Ký Quản Trị Viên</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            backdrop-filter: blur(10px);
            width: 350px;
            transition: all 0.3s ease-in-out;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .container h2 {
            margin-bottom: 1rem;
            color: #fff;
            font-size: 1.8rem;
        }

        .container form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .container input {
            padding: 0.8rem;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
        }

        .container input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .container input:focus {
            border-color: #a777e3;
            background: rgba(255, 255, 255, 0.2);
        }

        .container button {
            padding: 0.8rem;
            font-size: 1rem;
            background: #6e8efb;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .container button:hover {
            background: #a777e3;
        }

        .toggle-link {
            margin-top: 1rem;
            color: #fff;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        .toggle-link:hover {
            color: #a777e3;
        }
    </style>
</head>
<body>
    <div class="container" id="form-container">
        <h2 id="form-title">Đăng Nhập Quản Trị Viên</h2>
        <form id="login-form" onsubmit="handleLogin(event)">
            <input type="text" id="login-username" placeholder="Tên người dùng" required>
            <input type="password" id="login-password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng Nhập</button>
        </form>

        <form id="signup-form" onsubmit="handleSignUp(event)" style="display: none;">
            <input type="text" id="signup-username" placeholder="Tên người dùng" required>
            <input type="password" id="signup-password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng Ký</button>
        </form>

        <span class="toggle-link" onclick="toggleForms()">Chưa có tài khoản? Đăng ký tại đây.</span>
    </div>

    <script>
        const formContainer = document.getElementById('form-container');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const formTitle = document.getElementById('form-title');
        const toggleLink = document.querySelector('.toggle-link');

        const users = JSON.parse(localStorage.getItem('users')) || {}; // Tải người dùng đã lưu

        function toggleForms() {
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                formTitle.textContent = 'Đăng Nhập Quản Trị Viên';
                toggleLink.textContent = "Chưa có tài khoản? Đăng ký tại đây.";
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                formTitle.textContent = 'Đăng Ký Quản Trị Viên';
                toggleLink.textContent = 'Đã có tài khoản? Đăng nhập tại đây.';
            }
        }

        function handleSignUp(event) {
            event.preventDefault();
            const username = document.getElementById('signup-username').value;
            const password = document.getElementById('signup-password').value;

            if (users[username]) {
                alert('Tên người dùng đã tồn tại. Vui lòng chọn một tên khác.');
            } else {
                users[username] = password;
                localStorage.setItem('users', JSON.stringify(users)); // Lưu người dùng vào localStorage
                alert('Đăng ký thành công! Bạn có thể đăng nhập ngay bây giờ.');
                toggleForms();
            }
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            if (users[username] && users[username] === password) {
                localStorage.setItem('username', username);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'index.html'; // Chuyển hướng đến trang chủ
            } else {
                alert('Tên người dùng hoặc mật khẩu không hợp lệ. Vui lòng thử lại.');
            }
        }
    </script>
</body>
</html>
