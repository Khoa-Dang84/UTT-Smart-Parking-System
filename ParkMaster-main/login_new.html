<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Smart UTT Parking System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(10, 42, 120, 0.9), rgba(10, 42, 120, 0.92)),
                url("assets/login-bg.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-wrapper {
            width: 100%;
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 620px;
            min-height: 640px;
            background: #eaf0ff;
            border-radius: 34px;
            padding: 58px 78px 42px;
            position: relative;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.28);
            animation: fadeIn 0.6s ease;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: -22px;
            right: -20px;
            width: 230px;
            height: 120px;
            border-top: 3px dashed rgba(55, 98, 200, 0.55);
            border-radius: 50%;
            transform: rotate(-8deg);
        }

        .paper-plane {
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            color: #4f7ee8;
            font-size: 56px;
            opacity: 0.9;
        }

        .title {
            margin-top: 32px;
            text-align: center;
            font-size: 34px;
            letter-spacing: 2px;
            color: #213665;
            font-weight: 800;
        }

        .subtitle {
            margin-top: 10px;
            text-align: center;
            color: #596a9a;
            font-size: 15px;
            font-weight: 500;
        }

        .role-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 34px;
            margin-bottom: 18px;
        }

        .role-tab {
            border: none;
            outline: none;
            padding: 13px;
            border-radius: 12px;
            background: #dce6fb;
            color: #32456f;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
        }

        .role-tab.active {
            background: #1769d8;
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(23, 105, 216, 0.35);
        }

        .form-group {
            position: relative;
            margin-bottom: 22px;
        }

        .form-group input {
            width: 100%;
            height: 60px;
            border-radius: 8px;
            border: 1px solid #b9c6e6;
            background: #f8fbff;
            padding: 0 52px;
            font-size: 17px;
            color: #111827;
            outline: none;
            transition: 0.25s;
        }

        .form-group input:focus {
            border-color: #1769d8;
            box-shadow: 0 0 0 4px rgba(23, 105, 216, 0.12);
            background: #ffffff;
        }

        .icon-left {
            position: absolute;
            top: 50%;
            left: 18px;
            transform: translateY(-50%);
            font-size: 23px;
            color: #24406f;
        }

        .icon-right {
            position: absolute;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            font-size: 20px;
            color: #7b88a8;
            cursor: pointer;
            user-select: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 28px;
            color: #24375f;
            font-size: 16px;
        }

        .form-options a {
            color: #24375f;
            text-decoration: none;
            font-weight: 500;
        }

        .form-options a:hover {
            color: #1769d8;
        }

        .login-btn {
            width: 100%;
            height: 62px;
            border: none;
            border-radius: 9px;
            background: #1469df;
            color: #ffffff;
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 0 0 5px rgba(20, 105, 223, 0.18);
            transition: 0.25s;
        }

        .login-btn:hover {
            background: #0758c5;
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 36px 0 26px;
            color: #8790a8;
            font-size: 16px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #cbd3e5;
        }

        .divider span {
            padding: 0 18px;
        }

        .sso-btn {
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 8px;
            background: #024a93;
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.25s;
        }

        .sso-btn:hover {
            background: #013b77;
        }

        .sso-logo {
            background: white;
            color: #024a93;
            width: 36px;
            height: 24px;
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            font-weight: 900;
        }

        .footer-text {
            text-align: center;
            margin-top: 26px;
            color: #5c6c94;
            font-size: 14px;
        }

        .floating-badge {
            position: absolute;
            right: 30px;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.14);
            color: white;
            padding: 12px 18px;
            border-radius: 999px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 700px) {
            .login-card {
                width: 92%;
                padding: 46px 26px 34px;
                min-height: auto;
                border-radius: 26px;
            }

            .title {
                font-size: 28px;
            }

            .form-options {
                font-size: 14px;
            }

            .floating-badge {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="paper-plane">⌁</div>

            <h1 class="title">ĐĂNG NHẬP</h1>
            <p class="subtitle">Smart UTT Parking System</p>

            <div class="role-tabs">
                <button class="role-tab active" onclick="selectRole('student', this)">
                    Sinh viên
                </button>
                <button class="role-tab" onclick="selectRole('admin', this)">
                    Admin
                </button>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <span class="icon-left">👤</span>
                    <input type="text" id="username" placeholder="Mã sinh viên / Tài khoản admin" required />
                </div>

                <div class="form-group">
                    <span class="icon-left">🔑</span>
                    <input type="password" id="password" placeholder="Mật khẩu" required />
                    <span class="icon-right" onclick="togglePassword()">👁</span>
                </div>

                <div class="form-options">
                    <a href="#">Quên mật khẩu</a>
                    <a href="#">ⓘ Trợ giúp!</a>
                </div>

                <button type="submit" class="login-btn">ĐĂNG NHẬP</button>
            </form>

            <div class="divider">
                <span>Hoặc đăng nhập</span>
            </div>

            <button class="sso-btn">
                <span class="sso-logo">UTT</span>
                Đăng nhập bằng UTT SSO
            </button>

            <p class="footer-text">
                © 2026 Smart UTT Parking - Hệ thống gửi xe thông minh
            </p>
        </div>

        <div class="floating-badge">
            🚗 AI Parking System
        </div>
    </div>

    <script>
        let currentRole = "student";

        function selectRole(role, element) {
            currentRole = role;

            const tabs = document.querySelectorAll(".role-tab");
            tabs.forEach(tab => tab.classList.remove("active"));

            element.classList.add("active");

            const usernameInput = document.getElementById("username");

            if (role === "student") {
                usernameInput.placeholder = "Mã sinh viên";
            } else {
                usernameInput.placeholder = "Tài khoản admin";
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById("password");

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        }

        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!username || !password) {
                alert("Vui lòng nhập đầy đủ tài khoản và mật khẩu!");
                return;
            }

            /*
                Đây là phần demo frontend.
                Sau này khi có backend, chỗ này sẽ gọi API đăng nhập.

                Ví dụ:
                POST /api/auth/login
                {
                    username,
                    password,
                    role: currentRole
                }
            */

            if (currentRole === "admin") {
                alert("Đăng nhập Admin thành công!");
                window.location.href = "admin-dashboard.html";
            } else {
                alert("Đăng nhập Sinh viên thành công!");
                window.location.href = "student-home.html";
            }
        });
    </script>
</body>

</html>
